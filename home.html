<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home | page</title>

    <!-- tailwind + daisyUI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- font awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- css -->
    <link rel="stylesheet" href="./style.css" />
  </head>

  <body class="bg-[#f4f6f8] min-h-screen">

    <!-- LOADER ADDED -->
    <div id="loader" class="fixed inset-0 flex items-center justify-center bg-black/20 z-50 hidden">
      <span class="loading loading-spinner loading-xl"></span>
    </div>

    <!-- navbar -->
    <header>
      <div
        class="flex flex-col gap-4 items-center md:flex md:flex-row md:justify-between md:items-end md:px-20 mb-10 py-5 bg-base-100 shadow-sm"
      >
        <div class="flex-1">
          <div class="flex items-center gap-2">
            <div class="w-10">
              <img src="./assets/github-logo.png" alt="" />
            </div>
            <h2 class="text-2xl font-bold">GitHub Issues Tracker</h2>
          </div>
        </div>
        <div class="flex gap-2">
          <label class="input">
            <svg
              class="h-[1em] opacity-50"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
            >
              <g
                stroke-linejoin="round"
                stroke-linecap="round"
                stroke-width="2.5"
                fill="none"
                stroke="currentColor"
              >
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.3-4.3"></path>
              </g>
            </svg>
            <input type="search" required placeholder="Search" />
          </label>

          <button class="btn btn-primary">+ New Issue</button>
        </div>
      </div>
    </header>

    <main>
      <!-- all three buttons -->
      <section class="w-11/12 mx-auto bg-white p-6 rounded-lg flex gap-3 mb-5">
        <button onclick="toggleBtns(allBtn)" id="allBtn" class="btn btn-primary">
          All
        </button>
        <button onclick="toggleBtns(openBtn)" id="openBtn" class="btn">
          Open
        </button>
        <button onclick="toggleBtns(closeBtn)" id="closeBtn" class="btn">
          Close
        </button>
      </section>

      <!-- issues count section -->
      <section
        class="w-11/12 mx-auto bg-white p-6 rounded-lg sm:flex sm:justify-between sm:items-center mb-2"
      >
        <div class="issues-section-left flex gap-3">
          <div class="inline-block sm:bg-[#ECE4FF] p-3 rounded-full">
            <img src="./assets/Aperture.png" alt="" />
          </div>
          <div>
            <h2 class="font-semibold text-[20px]">
              <span id="issuesCount">50</span> Issues
            </h2>
            <p class="text-gray-500">Track and manage your project issues</p>
          </div>
        </div>

        <div class="issues-section-right flex gap-5 ml-5">
          <div class="flex items-center gap-2">
            <div class="w-3 h-3 bg-green-600 rounded-full"></div>
            <p class="font-medium">Open</p>
          </div>

          <div class="flex items-center gap-2">
            <div class="w-3 h-3 bg-purple-600 rounded-full"></div>
            <p class="font-medium">Close</p>
          </div>
        </div>
      </section>

      <!-- all issues section -->
      <section class="w-11/12 mx-auto">
        <div
          id="allIssuesSection"
          class="bg-base-200 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 p-5"
        >
        </div>
      </section>
    </main>

    <!-- javascript -->
    <script src="./script/home.js"></script>
  </body>
</html>
