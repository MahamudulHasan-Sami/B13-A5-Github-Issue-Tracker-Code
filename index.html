<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | page</title>

    <!-- tailwind + daisyUI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- font awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- css -->
    <link rel="stylesheet" href="./style.css" />

  </head>
  <body>
    
    <div class="flex justify-center items-center bg-base-200 min-h-screen">
      <div class="bg-base-100 shadow-2xl rounded-xl w-[600px] h-[700px]">
        <div class="p-8 space-y-3">
          <div class="text-center">
            <div class="inline-block">
              <img src="./assets/github-logo.png" alt="" />
            </div>
            <h2 class="text-2xl font-semibold">GitHub Issues Tracker</h2>
            <p class="text-gray-600">Sign in to manage your issues</p>
          </div>
          
          <fieldset class="fieldset">
            <label class="label font-extrabold text-gray-600">Username</label>
            <input
              id="usernameInputId"
              type="text"
              class="input w-full rounded-lg"
              placeholder="Enter Username"
            />
            <div><p class="text-primary font-bold">Default: admin</p></div>
            <label class="label font-extrabold text-gray-600 mt-3"
              >Password</label
            >
            <input
              id="passwordInputId"
              type="password"
              class="input w-full rounded-lg"
              placeholder="Enter Password"
            />
            <div><p class="text-primary font-bold">Default: admin123</p></div>
            <button id="loginBtnId" class="btn btn-primary mt-4 rounded-lg mt-5">Login</button>
          </fieldset>

          <div class="flex items-center">
            <hr class="flex-grow border-gray-300" />
            <span class="px-3 text-sm">OR</span>
            <hr class="flex-grow border-gray-300" />
          </div>

          <h2 class="text-center text-gray-600">Demo Credentials:</h2>

          <div class="text-center bg-gray-100 p-8 rounded-2xl">
            <p><span class="font-bold">Username: </span>admin</p>
            <p><span class="font-bold">Password: </span>admin123</p>
          </div>
        </div>
      </div>

    <!-- javascript -->
    <script src="./script/login.js"></script>
  </body>
</html>
